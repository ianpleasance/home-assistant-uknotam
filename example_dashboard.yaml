title: UK NOTAM Monitor
icon: mdi:airplane-alert
path: notam
views:
  - title: Active NOTAMs
    path: notams
    icon: mdi:bell-alert
    badges: []
    cards:
      - type: entities
        title: NOTAM Bulletin Summary
        icon: mdi:information
        entities:
          - entity: sensor.uknotam_data
            name: Active NOTAMs
            icon: mdi:counter
          - type: attribute
            entity: sensor.uknotam_data
            attribute: issued
            name: Bulletin Issued
            icon: mdi:clock-outline
          - type: attribute
            entity: sensor.uknotam_data
            attribute: valid_from
            name: Valid From
            icon: mdi:calendar-start
          - type: attribute
            entity: sensor.uknotam_data
            attribute: valid_to
            name: Valid To
            icon: mdi:calendar-end
          - type: attribute
            entity: sensor.uknotam_data
            attribute: organisation
            name: Organisation
            icon: mdi:office-building
          - type: attribute
            entity: sensor.uknotam_data
            attribute: content_explanation
            name: Coverage
            icon: mdi:map-marker-radius
      - type: markdown
        title: NOTAMs by Aerodrome
        content: >
          {% set aerodromes = ['EGSS', 'EGMC', 'EGPH', 'EGLL', 'EGKK', 'EGGW']
          %}

          {% for aerodrome in aerodromes %}

          {% set notams = states.sensor | selectattr('entity_id', 'search',
          'uknotam_' + aerodrome.lower() + '_') | list %}

          {% if notams | length > 0 %}

          ## {{ aerodrome }} ({{ notams | length }} NOTAMs)

          {% for notam in notams %}

          **{{ state_attr(notam.entity_id, 'series') }}{{
          state_attr(notam.entity_id, 'number') }}/{{
          state_attr(notam.entity_id, 'year') }}** - {{
          state_attr(notam.entity_id, 'aerodrome_name') or aerodrome }}

          - Valid: {{ state_attr(notam.entity_id, 'start_validity') }} to {{
          state_attr(notam.entity_id, 'end_validity') }}

          - {{ states(notam.entity_id) }}


          {% endfor %}

          ---

          {% endif %}

          {% endfor %}


          {% set other_notams = states.sensor | selectattr('entity_id',
          'search', 'uknotam_') | rejectattr('entity_id', 'in',
          ['sensor.uknotam_data', 'sensor.uknotam_firs', 'sensor.uknotam_aerodromes'])
          | reject('match', 'sensor.uknotam_(egss|egmc|egph|egll|egkk|eggw)_.*') |
          list %}

          {% if other_notams | length > 0 %}

          ## Other Aerodromes ({{ other_notams | length }} NOTAMs)

          {% for notam in other_notams %}

          **{{ state_attr(notam.entity_id, 'aerodrome_code') }}** - {{
          state_attr(notam.entity_id, 'series') }}{{ state_attr(notam.entity_id,
          'number') }}/{{ state_attr(notam.entity_id, 'year') }}

          - {{ states(notam.entity_id) }}


          {% endfor %}

          {% endif %}
      - type: glance
        title: Quick Statistics
        columns: 3
        entities:
          - entity: sensor.uknotam_data
            name: Active NOTAMs
            icon: mdi:bell-alert
          - entity: sensor.uknotam_aerodromes
            name: UK Aerodromes
            icon: mdi:airport
          - entity: sensor.uknotam_firs
            name: FIRs
            icon: mdi:earth
      - type: button
        name: Refresh NOTAMs
        icon: mdi:refresh
        tap_action:
          action: call-service
          service: notam.refresh
  - title: Configuration
    path: config
    icon: mdi:cog
    badges: []
    cards:
      - type: markdown
        title: Active Filters
        icon: mdi:filter
        content: >
          <style>

          table { width: 100%; border-collapse: collapse; }

          th { background-color: var(--primary-color); color:
          var(--text-primary-color); padding: 8px; text-align: left; }

          td { padding: 8px; border-bottom: 1px solid var(--divider-color); }

          tr:hover { background-color: var(--table-row-background-color); }

          </style>


          ## Configured Aerodromes


          {% set config_aerodromes = ['EGSS', 'EGMC', 'EGPH', 'EGLL', 'EGKK'] %}

          {% set aerodrome_data = state_attr('sensor.uknotam_aerodromes',
          'aerodromes') %}


          <table>

          <tr><th>ICAO</th><th>Name</th><th>City</th><th>IATA</th><th>FIR</th></tr>

          {% for code in config_aerodromes %}

          {% set aero = aerodrome_data | selectattr('code', 'eq', code) | first
          %}

          {% if aero %}

          <tr>

          <td><b>{{ code }}</b></td>

          <td>{{ aero.name }}</td>

          <td>{{ aero.city }}</td>

          <td>{{ aero.get('iata', '-') }}</td>

          <td>{{ aero.firs | join(', ') }}</td>

          </tr>

          {% endif %}

          {% endfor %}

          </table>


          ---


          ## Configured Coordinate Areas


          <table>

          <tr><th>#</th><th>Latitude</th><th>Longitude</th><th>Range</th></tr>

          <tr><td>1</td><td>51.67°N</td><td>0.41°W</td><td>25 NM</td></tr>

          </table>


          **Coverage:** Covers London area including Heathrow, Luton, Gatwick,
          and surrounding airports


          ---


          ## Filter Logic


          **Type:** OR logic - NOTAMs are included if they match:

          - Any configured aerodrome **OR**

          - Fall within any configured coordinate area


          **Refresh Interval:** 60 minutes
      - type: markdown
        title: Modify Configuration
        icon: mdi:pencil
        content: |
          ### To Change Settings:

          1. Go to **Settings → Devices & Services**
          2. Find **NOTAM** integration
          3. Click **Configure**

          #### Change Aerodromes:
          - Enter comma-separated ICAO codes
          - Example: `EGLL,EGKK,EGSS`
          - Leave blank to use only coordinates

          #### Change Coordinate Areas:
          - Check "Modify coordinates"
          - Enter latitude/longitude and range
          - Can add multiple areas
          - Leave all blank to use only aerodromes

          #### Refresh Interval:
          - Default: 60 minutes
          - Minimum: 15 minutes recommended
          - PIB bulletin updates hourly
      - type: entities
        title: Integration Statistics
        icon: mdi:chart-line
        entities:
          - entity: sensor.uknotam_data
            name: Matching NOTAMs
            icon: mdi:check-circle
          - type: attribute
            entity: sensor.uknotam_aerodromes
            attribute: aerodrome_count
            name: Total UK Aerodromes
            icon: mdi:airport
          - type: attribute
            entity: sensor.uknotam_firs
            attribute: fir_count
            name: Total UK FIRs
            icon: mdi:map-marker-radius
  - title: Reference Data
    path: reference
    icon: mdi:book-open-variant
    badges: []
    cards:
      - type: markdown
        title: UK Flight Information Regions
        icon: mdi:earth
        content: >
          <style>

          table { width: 100%; border-collapse: collapse; }

          th { background-color: var(--primary-color); color:
          var(--text-primary-color); padding: 8px; text-align: left; }

          td { padding: 8px; border-bottom: 1px solid var(--divider-color); }

          tr:hover { background-color: var(--table-row-background-color); }

          </style>


          {% set firs = state_attr('sensor.uknotam_firs', 'firs') %}


          <table>

          <tr><th>ICAO Code</th><th>FIR Name</th></tr>

          {% for icao, name in firs.items() %}

          <tr><td><b>{{ icao }}</b></td><td>{{ name }}</td></tr>

          {% endfor %}

          </table>


          **Total FIRs:** {{ state_attr('sensor.uknotam_firs', 'fir_count') }}
      - type: markdown
        title: Major UK Aerodromes
        icon: mdi:airport
        content: >
          <style>

          table { width: 100%; border-collapse: collapse; }

          th { background-color: var(--primary-color); color:
          var(--text-primary-color); padding: 8px; text-align: left; }

          td { padding: 8px; border-bottom: 1px solid var(--divider-color); }

          tr:hover { background-color: var(--table-row-background-color); }

          </style>


          {% set all_aerodromes = state_attr('sensor.uknotam_aerodromes',
          'aerodromes') %}

          {% set major_codes = ['EGLL', 'EGKK', 'EGSS', 'EGCC', 'EGPH', 'EGPF',
          'EGNX', 'EGGW', 'EGLC', 'EGMC', 'EGBB', 'EGGD'] %}


          <table>

          <tr><th>ICAO</th><th>IATA</th><th>Name</th><th>City</th><th>FIR</th></tr>

          {% for code in major_codes %}

          {% set aero = all_aerodromes | selectattr('code', 'eq', code) | first
          %}

          {% if aero %}

          <tr>

          <td><b>{{ code }}</b></td>

          <td>{{ aero.get('iata', '-') }}</td>

          <td>{{ aero.name }}</td>

          <td>{{ aero.city }}</td>

          <td>{{ aero.firs | join(', ') }}</td>

          </tr>

          {% endif %}

          {% endfor %}

          </table>
      - type: markdown
        title: Search Aerodromes
        icon: mdi:magnify
        content: >
          **Find a specific aerodrome:**


          Go to **Developer Tools → States** and search for
          `sensor.uknotam_aerodromes`


          Then look in the **attributes** section for the `aerodromes` list. You
          can:

          - Press Ctrl+F to search

          - Look for ICAO code, name, or city


          Or use this template in **Developer Tools → Template**:

          ```

          {% set search = "HEATHROW" %}

          {% set aerodromes = state_attr('sensor.uknotam_aerodromes',
          'aerodromes') %}

          {{ aerodromes | selectattr('name', 'search', search) | list }}

          ```
      - type: markdown
        title: All UK Aerodromes (First 50)
        icon: mdi:format-list-bulleted
        content: >
          <style>

          table { width: 100%; border-collapse: collapse; font-size: 0.9em; }

          th { background-color: var(--primary-color); color:
          var(--text-primary-color); padding: 6px; text-align: left; }

          td { padding: 6px; border-bottom: 1px solid var(--divider-color); }

          tr:hover { background-color: var(--table-row-background-color); }

          </style>


          {% set all_aerodromes = state_attr('sensor.uknotam_aerodromes',
          'aerodromes') %}


          **Total:** {{ all_aerodromes | length }} aerodromes | **Showing:**
          First 50 (sorted A-Z)


          <table>

          <tr><th>ICAO</th><th>Name</th><th>City</th><th>IATA</th><th>FIR</th></tr>

          {% for aero in all_aerodromes | sort(attribute='code') | list %}

          {% if loop.index <= 50 %}

          <tr>

          <td><b>{{ aero.code }}</b></td>

          <td>{{ aero.name }}</td>

          <td>{{ aero.get('city', '-') }}</td>

          <td>{{ aero.get('iata', '-') }}</td>

          <td>{{ aero.firs | join(', ') }}</td>

          </tr>

          {% endif %}

          {% endfor %}

          </table>
      - type: markdown
        title: Quick Reference
        icon: mdi:help-circle
        content: |
          ### NOTAM Series Codes

          - **A** - Aerodromes and Navigation Facilities
          - **B** - Airspace Organization/Procedures  
          - **C** - Chart/AIP Supplement
          - **D** - Danger/Restricted/Prohibited Areas
          - **E** - En-route Facilities
          - **F** - Facilities and Services
          - **G** - ATS Routes
          - **H** - Helicopter Operations
          - **I** - Information (AIP/Charts)
          - **J** - ATC Procedures
          - **K** - Schedule/Times
          - **L** - Light/Lighting
          - **M** - Miscellaneous
          - **N** - Navigation Warnings
          - **O** - Obstacles
          - **P** - Personnel/Procedures
          - **R** - Replacement/Cancellation
          - **S** - Service/Facilities
          - **T** - Training/Testing
          - **U** - Unserviceability
          - **V** - VFR Operations
          - **W** - Weather/Meteorology

          ### FIR Codes

          - **EGTT** - London FIR (Most of England/Wales)
          - **EGPX** - Scottish FIR (Scotland/Northern Ireland)

          ### Validity Codes

          - **PERM** - Permanent (no end date)
          - **UFN** - Until Further Notice
          - Date format: `YYYY-MM-DD HH:MM:SS`
