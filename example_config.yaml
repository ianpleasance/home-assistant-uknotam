# Example configurations for the NOTAM integration

# Example 1: Monitor specific airports
notam:
  airfields:
    - "EGLL"  # London Heathrow
    - "EGKK"  # London Gatwick
    - "EGSS"  # London Stansted
  refresh_interval: 60

